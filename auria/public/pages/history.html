<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AURIA — History</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
body{
  background:#0b1020;
  color:white;
  font-family:sans-serif;
  margin:0;
}
.container{
  padding:40px;
}
.card{
  background:#141a2e;
  padding:20px;
  margin-bottom:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  background:#1d2540;
}
.topbar{
  padding:20px;
  background:#11162a;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  background:#5b7cff;
  border:none;
  padding:10px 18px;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <h2>📜 سجل المحادثات</h2>
  <button onclick="window.location='/chat'">رجوع للدردشة</button>
</div>

<div class="container" id="historyContainer">
  جاري تحميل المحادثات...
</div>

<script>
async function loadHistory(){
  try{
    const res = await fetch('/api/chat/conversations',{
      credentials:'include'
    });

    const data = await res.json();
    const container = document.getElementById('historyContainer');
    container.innerHTML = '';

    if(!data.conversations || data.conversations.length === 0){
      container.innerHTML = "<p>لا يوجد محادثات بعد 💬</p>";
      return;
    }

    data.conversations.forEach(conv=>{
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <h3>${conv.title}</h3>
        <p>${conv.lastMessage || ''}</p>
      `;
      div.onclick = () => {
        window.location = "/chat?conversationId=" + conv.id;
      };
      container.appendChild(div);
    });

  }catch(err){
    document.getElementById('historyContainer').innerHTML = "حدث خطأ أثناء تحميل السجل";
  }
}

loadHistory();
</script>

</body>
</html>
